<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GateFlow — Redirecting to Preparation System</title>
  
  <!-- Automatic Redirect Meta (Defaults to Vercel production URL, edit the content URL below to match your custom domain) -->
  <meta http-equiv="refresh" content="3; url=https://gateflow-five.vercel.app">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Premium custom styles */
    .sunrise-text {
      background: linear-gradient(135deg, #FF7A18, #FFB547);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .btn-sunrise {
      background: linear-gradient(135deg, #FF7A18, #FFB547);
      box-shadow: 0 8px 24px -8px rgba(255, 122, 24, 0.45);
    }
    .btn-sunrise:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="min-h-screen bg-[#FAF8F5] flex flex-col justify-between items-center py-12 px-6 relative overflow-hidden font-sans">
  
  <!-- Subtle tactile noise grain -->
  <div class="absolute inset-0 opacity-[0.015] pointer-events-none mix-blend-overlay z-0" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.8\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E')"></div>

  <!-- Warm ambient blurred lights -->
  <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-[#FF7A18]/10 blur-[120px] pointer-events-none z-0"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-[#FFB547]/12 blur-[150px] pointer-events-none z-0"></div>

  <!-- Header logo -->
  <div class="flex items-center gap-2.5 relative z-10">
    <div class="w-9 h-9 rounded-full overflow-hidden shadow-md border border-[#FFB547] bg-white flex items-center justify-center">
      <img src="favicon.png" alt="GateFlow Logo" class="w-full h-full object-cover" onerror="this.src='gateflow-logo.png'">
    </div>
    <span class="font-serif text-xl font-black tracking-tight text-[#1A1A1A]">Gate<span class="sunrise-text">Flow</span></span>
  </div>

  <!-- Main Card -->
  <div class="max-w-md w-full bg-white/50 backdrop-blur-xl border border-white/60 rounded-[32px] p-8 md:p-10 text-center shadow-[0_24px_50px_-15px_rgba(26,26,26,0.06)] relative z-10 my-auto">
    <!-- Spinning Premium Loader -->
    <div class="relative w-16 h-16 mx-auto mb-6 flex items-center justify-center">
      <div class="absolute inset-0 rounded-full border-4 border-[#FFE5D0] opacity-50"></div>
      <div class="absolute inset-0 rounded-full border-4 border-t-[#FF7A18] animate-spin"></div>
      <!-- Lock icon or Graduation cap in center -->
      <span class="text-xl">🚀</span>
    </div>

    <h1 class="font-serif text-2xl font-extrabold text-[#1A1A1A] tracking-tight">Connecting to GateFlow</h1>
    <p class="text-sm text-[#6B5E52] mt-3 leading-relaxed">
      Please wait while we redirect you to your personalized preparation dashboard.
    </p>

    <!-- Fallback Manual Button -->
    <div class="mt-8">
      <a id="redirect-link" href="https://gateflow-five.vercel.app" class="btn-sunrise text-white font-semibold text-sm px-6 py-3 rounded-full inline-flex items-center gap-2 transition-all duration-200">
        Go to Dashboard →
      </a>
    </div>

    <p class="text-[11px] text-[#8C7E72] mt-4 font-medium">
      Click the button above if you are not redirected within 3 seconds.
    </p>
  </div>

  <!-- Footer -->
  <div class="text-center text-xs text-[#8C7E72]/70 relative z-10 font-medium tracking-wide">
    © 2026 GateFlow • Your Journey. Your Rank. Your Glory.
  </div>

  <script>
    // Customize production redirect URL easily
    const PRODUCTION_URL = "https://gateflow-five.vercel.app"; // Update this with your live link!
    
    // Set href and meta redirect programmatically to keep it robust
    document.getElementById("redirect-link").href = PRODUCTION_URL;
    
    const metaTag = document.querySelector('meta[http-equiv="refresh"]');
    if (metaTag) {
      metaTag.setAttribute("content", `3; url=${PRODUCTION_URL}`);
    }
  </script>
</body>
</html>
